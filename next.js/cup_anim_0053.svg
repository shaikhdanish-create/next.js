<svg width="1920" height="1080" xmlns="http://www.w3.org/2000/svg">
            <rect width="100%" height="100%" fill="#3e2723"/>
            <g transform="translate(1000, 500)">
                <!-- Left (Back) Cup - Dark Brown -->
                <g transform="translate(-150, 0)">
                    <rect x="-75" y="0" width="150" height="200" fill="#3e2723" rx="10" stroke="#1a100e" stroke-width="2"/>
                    <rect x="-85" y="-20" width="170" height="30" fill="white" rx="5"/>
                    <!-- Ribbed Sleeve -->
                    <rect x="-80" y="70" width="160" height="60" fill="#8d6e63"/>
                    <line x1="-60" y1="70" x2="-60" y2="130" stroke="#5d4037" stroke-width="2"/>
                    <line x1="-20" y1="70" x2="-20" y2="130" stroke="#5d4037" stroke-width="2"/>
                    <line x1="20" y1="70" x2="20" y2="130" stroke="#5d4037" stroke-width="2"/>
                    <line x1="60" y1="70" x2="60" y2="130" stroke="#5d4037" stroke-width="2"/>
                </g>
                
                <!-- Right (Front) Cup - Cream colored speckled -->
                <g transform="translate(150, -49.5) rotate(6.6000000000000005)">
                    <rect x="-75" y="0" width="150" height="200" fill="#f5f5dc" rx="10"/>
                    <circle cx="-50" cy="50" r="2" fill="#d3d3d3"/>
                    <circle cx="20" cy="150" r="1.5" fill="#a9a9a9"/>
                    <circle cx="-30" cy="180" r="2" fill="#d3d3d3"/>
                    <circle cx="40" cy="30" r="1.5" fill="#a9a9a9"/>
                    
                    <!-- Lid lifting -->
                    <rect x="-85" y="-26.5" width="170" height="30" fill="black" rx="5" transform="rotate(-3.25)"/>
                    
                    <!-- Kraft Sleeve -->
                    <rect x="-80" y="70" width="160" height="60" fill="#d2b48c"/>
                </g>
            </g>
        </svg>